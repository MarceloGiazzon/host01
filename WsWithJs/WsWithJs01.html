<!DOCTYPE html>
<head>
    <title>SOAP Javascript Test</title>
</head>
<body>
    <script type="text/javascript">
        function soapTest() {
            var xmlhttp = new XMLHttpRequest();
           
            //replace second argument with the path to your Secret Server webservices
            xmlhttp.open('POST', '/Id7457555fbe8900931de280bc84c5fec0/printerit.awsprintv1.aspx HTTP/1.1', true);

/*
GXSoapHTTPClient.setHost( "apps5.genexus.com" );
GXSoapHTTPClient.setPort( 443 );
GXSoapHTTPClient.setSecure( (byte)(1) );
GXSoapHTTPClient.setBaseURL( "/Id7457555fbe8900931de280bc84c5fec0/" );
SoapParm.assignlocationproperties( context, "PrinterITOneSignal_WSPrintV1", GXSoapHTTPClient);
*/
            //create the SOAP request
            //replace username, password (and org + domain, if necessary) with the appropriate info
            var strRequest =
                '<?xml version="1.0" encoding="utf-8"?>'
                +   '<soapenv:Envelope '

                +   'xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" '
                +   'xmlns:xsd="http://www.w3.org/2001/XMLSchema" '
                +   'xmlns:xsi=http://www.w3.org/2001/XMLSchema-instance" '
                +   'xmlns:prin="PrinterIt">'

                +   '<soapenv:Header/>'
                +   '<soapenv:Body>'
                +       '<prin:PrinterIT.WSPrintV1.REQUESTREGISTERCODE>'
                +           '<prin:Sdtwsregisteruserinv1>'
                +               '<prin:Connection>'
                +                   '<prin:UserCode>asddadas</prin:UserCode>'
                +                   '<prin:UserPassword></prin:UserPassword>'
                +                   '</prin:Connection>'
                +                   '<prin:UserCode>testeSoapUi</prin:UserCode>'
                +               '</prin:Sdtwsregisteruserinv1>'
                +           '</prin:PrinterIT.WSPrintV1.REQUESTREGISTERCODE>'
                +    '</soapenv:Body>'
                +    '</soapenv:Envelope>';

            //specify request headers
            xmlhttp.setRequestHeader('Host', 'apps5.genexus.com');
            xmlhttp.setRequestHeader('Connection', 'close');
            xmlhttp.setRequestHeader('Content-Type', 'text/xml; charset=utf-8');
            xmlhttp.setRequestHeader('SOAPAction', '"PrinterItaction/printerit.AWSPRINTV1.REQUESTREGISTERCODE"');

            //FOR TESTING: display results in an alert box once the response is received
            xmlhttp.onreadystatechange = function () {
                if (xmlhttp.readyState == 4) {
                    console.log(xmlhttp.responseText);
                }
            };

            xmlhttp.send(strRequest);
        };
       
        window.onload = function() {
            soapTest();
        };

    </script>
</body>
</html>
